name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build executable
        shell: pwsh
        run: scripts\build_windows_exe.ps1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: FetchFolderArt-Windows-x64
          path: dist/FetchFolderArt-Windows-x64.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if (gh release view "${env:GITHUB_REF_NAME}" *> $null) {
            gh release upload "${env:GITHUB_REF_NAME}" "dist/FetchFolderArt-Windows-x64.zip" --clobber
          } else {
            gh release create "${env:GITHUB_REF_NAME}" `
              "dist/FetchFolderArt-Windows-x64.zip" `
              --title "FetchFolderArt ${env:GITHUB_REF_NAME}" `
              --notes "Standalone Windows executable. Download the ZIP, extract it, and run FetchFolderArt.exe."
          }
